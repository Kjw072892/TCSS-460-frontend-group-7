  <rect x="18" y="18" width="164" height="264" rx="10" fill="none" stroke="#4a4a4a" stroke-width="2" />
  <path d="M56 104h88l-44 40z" fill="#f5c518" opacity="0.95" />
  <rect x="52" y="154" width="96" height="12" rx="6" fill="#f5c518" opacity="0.9" />
